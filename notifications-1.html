<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrustPay — Notifications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#0B1220; --ink-soft:#1B2B45; --ink-softer:#33507A;
    --paper:#FFFFFF; --paper-dim:#F2F6FF;
    --blue:#2F5FFF; --blue-light:#7A9EFF; --blue-pale:#E8EEFF;
    --line: rgba(11,18,32,0.10); --gray:#5B677A;
    --green:#22C55E; --amber:#F59E0B; --red:#EF4444;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--paper-dim); color:var(--ink); line-height:1.6;}
  h1,h2,h3{font-family:'Sora',sans-serif; font-weight:700; letter-spacing:-0.02em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit; text-decoration:none;}
  button{font-family:inherit; cursor:pointer; border:none; background:none;}

  .app{display:grid; grid-template-columns:240px 1fr; min-height:100vh;}
  .side{background:var(--ink); color:#fff; padding:26px 20px; position:sticky; top:0; height:100vh;}
  .side .brand{font-family:'Sora',sans-serif; font-weight:700; font-size:1.15rem; margin-bottom:36px;}
  .side .brand b{color:var(--blue-light);}
  .side nav a{display:flex; align-items:center; gap:10px; padding:11px 12px; border-radius:8px; color:rgba(255,255,255,0.65); font-size:0.92rem; font-weight:500; margin-bottom:4px; transition:background .15s,color .15s;}
  .side nav a:hover{background:rgba(255,255,255,0.06); color:#fff;}
  .side nav a.active{background:var(--blue); color:#fff;}
  .side nav .grp-label{font-family:'JetBrains Mono',monospace; font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.35); margin:22px 0 8px 12px;}

  .main{padding:32px 40px 60px; max-width:820px;}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:26px;}
  .topbar h1{font-size:1.5rem; display:flex; align-items:center; gap:10px;}
  .topbar p{color:var(--gray); font-size:0.9rem; margin-top:4px;}
  .unread-count{background:var(--red); color:#fff; font-size:0.72rem; font-weight:700; padding:2px 9px; border-radius:20px; font-family:'JetBrains Mono',monospace;}
  .mark-all{font-size:0.84rem; font-weight:600; color:var(--blue); padding:9px 16px; border:1px solid var(--line); border-radius:8px; background:#fff;}
  .mark-all:hover{background:var(--blue-pale);}
  .mark-all:disabled{opacity:0.5; cursor:default;}

  .filters{display:flex; gap:8px; margin-bottom:20px;}
  .filters button{padding:7px 14px; border-radius:20px; font-size:0.82rem; font-weight:600; color:var(--ink-softer); background:#fff; border:1px solid var(--line);}
  .filters button.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  .list{background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden;}
  .n-item{display:flex; gap:14px; padding:16px 20px; border-bottom:1px solid var(--line); position:relative; transition:background .12s;}
  .n-item:last-child{border-bottom:none;}
  .n-item:hover{background:var(--paper-dim);}
  .n-item.unread{background:#F7FAFF;}
  .n-item.unread::before{content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--blue);}
  .n-icon{width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.05rem; flex-shrink:0;}
  .n-icon.payment{background:var(--blue-pale); color:var(--blue);}
  .n-icon.shipping{background:#FFF7ED; color:var(--amber);}
  .n-icon.dispute{background:#FEF2F2; color:var(--red);}
  .n-icon.kyc{background:#F5F3FF; color:#7C3AED;}
  .n-icon.system{background:#ECFDF5; color:var(--green);}
  .n-body{flex:1; min-width:0;}
  .n-title{font-size:0.92rem; font-weight:600; margin-bottom:2px;}
  .n-msg{font-size:0.86rem; color:var(--gray); margin-bottom:6px;}
  .n-meta{display:flex; gap:12px; align-items:center; font-size:0.76rem; color:var(--gray);}
  .n-meta a{color:var(--blue); font-weight:600;}
  .n-time{font-size:0.76rem; color:var(--gray); white-space:nowrap; margin-top:2px;}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--blue); flex-shrink:0; margin-top:6px;}

  .empty{text-align:center; padding:70px 20px; color:var(--gray);}
  .empty .big{font-size:2.4rem; margin-bottom:10px;}
  .loading-gate{position:fixed; inset:0; background:var(--paper-dim); display:flex; align-items:center; justify-content:center; z-index:999; font-size:0.9rem; color:var(--gray);}

  @media(max-width:900px){
    .app{grid-template-columns:1fr;}
    .side{position:relative; height:auto;}
    .main{padding:24px 18px;}
  }
</style>
</head>
<body>

<div class="loading-gate" id="loading-gate">Loading…</div>

<div class="app" id="app-shell" style="display:none;">
  <aside class="side">
    <div class="brand">Trust<b>Pay</b></div>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="dashboard.html#escrows">My Escrows</a>
      <a href="chat.html">Chat</a>
      <a href="dashboard.html#disputes">Disputes</a>
      <a href="wallet.html">Wallet</a>
      <a href="profile.html">Profile</a>
      <div class="grp-label">Account</div>
      <a href="notifications.html" class="active">Notifications</a>
      <a href="login.html?logout=1">Logout</a>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>Notifications <span class="unread-count" id="unread-badge" style="display:none;">0</span></h1>
        <p>Updates about your escrows, payments, and account</p>
      </div>
      <button class="mark-all" id="mark-all-btn" onclick="markAllRead()">Mark all as read</button>
    </div>

    <div class="filters">
      <button class="active" data-f="all" onclick="setFilter('all')">All</button>
      <button data-f="unread" onclick="setFilter('unread')">Unread</button>
      <button data-f="payment" onclick="setFilter('payment')">Payments</button>
      <button data-f="shipping" onclick="setFilter('shipping')">Shipping</button>
      <button data-f="dispute" onclick="setFilter('dispute')">Disputes</button>
    </div>

    <div class="list" id="n-list"></div>
    <div class="empty" id="n-empty" style="display:none;">
      <div class="big">🔔</div>
      <div>No notifications here yet.</div>
    </div>
  </main>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCiPGG2alqPUjxrkWmUJu1nTMKe28oztzA",
    authDomain: "trust-pay-342b3.firebaseapp.com",
    projectId: "trust-pay-342b3",
    storageBucket: "trust-pay-342b3.firebasestorage.app",
    messagingSenderId: "757581172953",
    appId: "1:757581172953:web:28350ab5f7ec6f49fe6ec8"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;
  let allNotifs = [];
  let currentFilter = 'all';

  const ICONS = {
    payment_verified:['payment','💳'], payment_rejected:['payment','💳'],
    escrow_accepted:['shipping','📦'], shipped:['shipping','🚚'], delivered:['shipping','📬'],
    dispute_opened:['dispute','⚠️'], dispute_resolved:['dispute','✅'],
    kyc_verified:['kyc','🪪'], kyc_pending:['kyc','🪪'],
    default:['system','🔔']
  };
  function typeGroup(type){
    if(type && type.startsWith('payment')) return 'payment';
    if(['escrow_accepted','shipped','delivered'].includes(type)) return 'shipping';
    if(type && type.startsWith('dispute')) return 'dispute';
    return 'other';
  }

  auth.onAuthStateChanged(async (user) => {
    if(!user){ window.location.href = 'login.html'; return; }
    currentUser = user;
    await loadNotifications();
    document.getElementById('loading-gate').style.display = 'none';
    document.getElementById('app-shell').style.display = 'grid';
  });

  async function loadNotifications(){
    const snap = await db.collection('notifications')
      .where('userId','==', currentUser.uid)
      .orderBy('createdAt','desc')
      .limit(100)
      .get();
    allNotifs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }

  function setFilter(f){
    currentFilter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.toggle('active', b.dataset.f===f));
    render();
  }

  function render(){
    const unread = allNotifs.filter(n => !n.read).length;
    const badge = document.getElementById('unread-badge');
    if(unread > 0){ badge.style.display='inline-block'; badge.textContent = unread; }
    else badge.style.display = 'none';
    document.getElementById('mark-all-btn').disabled = unread === 0;

    let rows = allNotifs;
    if(currentFilter === 'unread') rows = rows.filter(n => !n.read);
    else if(currentFilter !== 'all') rows = rows.filter(n => typeGroup(n.type) === currentFilter);

    const list = document.getElementById('n-list');
    const empty = document.getElementById('n-empty');
    if(rows.length === 0){ list.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display = 'none';

    list.innerHTML = rows.map(n => {
      const [cls, emoji] = ICONS[n.type] || ICONS.default;
      const link = n.relatedEscrowId ? `<a href="escrow-detail.html?id=${n.relatedEscrowId}">View escrow →</a>` : '';
      return `
        <div class="n-item ${n.read?'':'unread'}" onclick="openNotif('${n.id}', ${!!n.relatedEscrowId}, '${n.relatedEscrowId||''}')">
          <div class="n-icon ${cls}">${emoji}</div>
          <div class="n-body">
            <div class="n-title">${escapeHtml(n.title||'Notification')}</div>
            <div class="n-msg">${escapeHtml(n.message||'')}</div>
            <div class="n-meta">${link}</div>
          </div>
          <div class="n-time">${fmtTime(n.createdAt)}</div>
        </div>`;
    }).join('');
  }

  async function openNotif(id, hasLink, escrowId){
    const n = allNotifs.find(x => x.id === id);
    if(n && !n.read){
      n.read = true;
      db.collection('notifications').doc(id).update({ read:true }).catch(()=>{});
      render();
    }
    if(hasLink) window.location.href = `escrow-detail.html?id=${escrowId}`;
  }

  async function markAllRead(){
    const unread = allNotifs.filter(n => !n.read);
    if(unread.length === 0) return;
    const batch = db.batch();
    unread.forEach(n => {
      n.read = true;
      batch.update(db.collection('notifications').doc(n.id), { read:true });
    });
    try{ await batch.commit(); } catch(err){ console.error(err); }
    render();
  }

  function fmtTime(ts){
    if(!ts || !ts.toDate) return '';
    const d = ts.toDate();
    const diffMin = Math.round((Date.now()-d.getTime())/60000);
    if(diffMin < 1) return 'just now';
    if(diffMin < 60) return diffMin + 'm ago';
    if(diffMin < 1440) return Math.round(diffMin/60) + 'h ago';
    return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
